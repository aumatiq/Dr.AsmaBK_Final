<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dr. Asma's Clinic — Patient Portal</title>
<meta name="description" content="Book appointments, view prescriptions and test reports — Dr. Asma's Clinic.">

<!-- ═══════════════════════════════════════════════════════════
  PWA MANIFEST — top-level document (this page), NOT the iframed
  Apps Script page. Browsers only look at the manifest link on the
  page the user is actually viewing at the top level for the
  "Add to Home Screen" prompt — so this link has to live here.

  ⚠️ REPLACE "YOUR_APPS_SCRIPT_EXEC_URL_HERE" everywhere in this
  file (2 places: this manifest link + the iframe src near the
  bottom) with the real exec URL after Apps Script deployment
  (Go-Live guide ধাপ ১).
═══════════════════════════════════════════════════════════ -->
<link rel="manifest" href="https://script.google.com/macros/s/AKfycbyeB7-bvniICjoB2Y5yosCwurBjMTK-FA2WArKbJ3U3PF_O1qBXDCO1hmQA0QIg0BPj8Q/exec?file=manifest">

<!-- Real, same-origin icon files (GitHub Pages hosts these under /icons/)
     — required for iOS "Add to Home Screen" regardless of manifest support,
     and as a same-origin fallback if the cross-origin manifest fetch above
     is ever blocked by a browser (see note in Part 20 delivery notes). -->
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
<link rel="shortcut icon" href="/icons/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png">

<meta name="theme-color" content="#0F0A1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dr. Asma Clinic">

<style>
  :root{
    --blk:#0F0A1A; --card:#171025; --ind:#4F46E5; --ind2:#6366F1;
    --gold:#F5A623; --wht:#F8F9FF; --sil:#A0A0B0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%; width:100%; overflow:hidden;
    background:var(--blk); font-family:'Segoe UI',system-ui,sans-serif;
  }

  /* ── Full-bleed iframe holding the actual patient app ── */
  #appFrame{
    position:fixed; inset:0; width:100%; height:100%;
    border:none; background:var(--blk);
    opacity:0; transition:opacity .4s ease;
  }
  #appFrame.loaded{ opacity:1; }

  /* ── Branded loading screen (shown until iframe fires load) ── */
  #loadingScreen{
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:20px; background:var(--blk);
    transition:opacity .35s ease, visibility .35s ease;
  }
  #loadingScreen.hidden{ opacity:0; visibility:hidden; pointer-events:none; }

  .aq-mark{
    width:56px; height:56px; border-radius:16px;
    background:linear-gradient(135deg,var(--ind),var(--ind2));
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:22px; color:#fff; letter-spacing:1px;
    box-shadow:0 8px 32px rgba(79,70,229,.35);
  }
  .clinic-name{
    font-size:15px; font-weight:600; color:var(--wht); letter-spacing:.3px;
  }
  .spinner{
    width:26px; height:26px; border-radius:50%;
    border:2.5px solid rgba(245,166,35,.25); border-top-color:var(--gold);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .loading-sub{ font-size:12px; color:var(--sil); }

  /* ── Fallback: shown if iframe fails to load within timeout ── */
  #fallback{
    position:fixed; inset:0; z-index:20; display:none;
    flex-direction:column; align-items:center; justify-content:center;
    gap:14px; background:var(--blk); padding:24px; text-align:center;
  }
  #fallback.show{ display:flex; }
  #fallback p{ color:var(--sil); font-size:14px; max-width:320px; line-height:1.6; }
  #fallback a{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--gold); color:var(--blk); font-weight:700;
    font-size:14px; padding:12px 24px; border-radius:8px; text-decoration:none;
  }
</style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loadingScreen">
    <div class="aq-mark">A</div>
    <div class="clinic-name">Dr. Asma's Clinic</div>
    <div class="spinner"></div>
    <div class="loading-sub">লোড হচ্ছে…</div>
  </div>

  <!-- Fallback (network/iframe failure) -->
  <div id="fallback">
    <div class="aq-mark">A</div>
    <p>অ্যাপ লোড হতে সময় নিচ্ছে। ইন্টারনেট কানেকশন চেক করুন, অথবা সরাসরি লিংকে যান।</p>
    <a id="directLink" href="#" target="_blank" rel="noopener">সরাসরি খুলুন →</a>
  </div>

  <!-- The actual patient app (Apps Script web app), iframed -->
  <iframe
    id="appFrame"
    title="Dr. Asma's Clinic — Patient Portal"
    src="https://script.google.com/macros/s/AKfycbyeB7-bvniICjoB2Y5yosCwurBjMTK-FA2WArKbJ3U3PF_O1qBXDCO1hmQA0QIg0BPj8Q/exec"
    allow="clipboard-write"
  ></iframe>

<script>
(function () {
  var EXEC_URL = "https://script.google.com/macros/s/AKfycbyeB7-bvniICjoB2Y5yosCwurBjMTK-FA2WArKbJ3U3PF_O1qBXDCO1hmQA0QIg0BPj8Q/exec"; // ধাপ ১ (Apps Script deploy) থেকে exec URL এখানে বসাও

  var frame     = document.getElementById('appFrame');
  var loading   = document.getElementById('loadingScreen');
  var fallback  = document.getElementById('fallback');
  var directLink= document.getElementById('directLink');

  directLink.href = EXEC_URL;

  var loaded = false;

  frame.addEventListener('load', function () {
    loaded = true;
    frame.classList.add('loaded');
    loading.classList.add('hidden');
  });

  // যদি ১২ সেকেন্ডেও iframe লোড না হয় (network issue, ভুল exec URL, ইত্যাদি) — fallback দেখাও
  setTimeout(function () {
    if (!loaded) {
      loading.classList.add('hidden');
      fallback.classList.add('show');
    }
  }, 12000);
})();
</script>

</body>
</html>
