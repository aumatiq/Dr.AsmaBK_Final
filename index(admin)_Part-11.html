<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Portal — ডা. আসমা ক্লিনিক</title>
<meta name="description" content="ডা. আসমা ক্লিনিক — অভ্যন্তরীণ স্টাফ ড্যাশবোর্ড। শুধু অনুমোদিত ব্যবহারকারীদের জন্য।">

<!-- 🔐 Part 17 security rule: staff URL সার্চ ইঞ্জিনে ইনডেক্স হবে না -->
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="theme-color" content="#0F0A1A">

<!-- ══════════════════════════════════════════════════════
     PART 11 — Two-URL Architecture
     এই ফাইল admin.drasma.aumatiq.com (শুধুমাত্র স্টাফের জন্য)
     সাবডোমেইনে GitHub Pages দিয়ে হোস্ট হয়। কাজ একটাই: Doctor
     Dashboard-এর আসল Apps Script exec URL (?page=dashboard)-এ
     instant auto-redirect করা। লগইন এখানে না — আসল Apps Script
     পেজে গিয়ে হবে (session/role guard Auth.gs-এ অপরিবর্তিত)।
     ══════════════════════════════════════════════════════ -->

<!-- Instant no-JS fallback -->
<meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbzkMBKWDavE2ZKIIsufc_N5Kwi6X-eow-Erz9lj9fgOjTuZPeRdkLFRjIOaqYZyT25Q1g/exec?page=dashboard">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0F0A1A; --bg2:#160D24; --bg3:#1C1230;
    --rose:#E8608A; --teal:#14B8A6; --indigo:#7C3AED; --gold:#F5A623;
    --wht:#FDF8FF; --sil:#C4B5D8; --sil2:#7A6892;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; overflow:hidden; }
  body{
    background: radial-gradient(ellipse at 50% 30%, var(--bg3) 0%, var(--bg) 65%);
    color: var(--wht);
    font-family:'Inter',sans-serif;
    min-height:100vh; min-height:100svh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px;
    animation: aq-fadein .35s ease-out;
  }
  @keyframes aq-fadein{ from{opacity:0;} to{opacity:1;} }

  .badge{
    font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    color: var(--gold); background: rgba(245,166,35,0.12);
    border:1px solid rgba(245,166,35,0.3); border-radius:20px;
    padding:5px 14px; margin-bottom:18px;
  }

  .mark{
    width:64px; height:64px; border-radius:18px;
    background: linear-gradient(135deg, var(--indigo), var(--rose));
    display:flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif; font-weight:800; font-size:24px; color:var(--wht);
    margin-bottom:22px;
    box-shadow: 0 12px 36px rgba(124,58,237,0.35);
    animation: aq-pulse 1.4s ease-in-out infinite;
  }
  @keyframes aq-pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.06); }
  }

  h1{
    font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(19px,5vw,24px);
    letter-spacing:-0.3px; margin-bottom:8px;
  }

  p.sub{ color:var(--sil); font-size:14px; margin-bottom:28px; max-width:320px; }

  .spinner{
    width:26px; height:26px; border-radius:50%;
    border:3px solid rgba(124,58,237,0.2);
    border-top-color: var(--indigo);
    animation: aq-spin .8s linear infinite;
    margin-bottom:20px;
  }
  @keyframes aq-spin{ to{ transform: rotate(360deg); } }

  .fallback{ font-size:12px; color:var(--sil2); }
  .fallback a{ color:var(--teal); text-decoration:none; font-weight:600; }
  .fallback a:hover{ color:var(--rose); }

  footer{
    position:fixed; bottom:18px; font-size:11px; color:var(--sil2); letter-spacing:0.3px;
  }
  footer a{ color:var(--sil2); text-decoration:none; }
</style>
</head>
<body>

  <span class="badge">Staff Only</span>
  <div class="mark" aria-hidden="true">AK</div>
  <h1>Doctor Dashboard</h1>
  <div class="spinner" role="status" aria-label="Loading"></div>
  <p class="sub">নিরাপদ স্টাফ পোর্টালে নিয়ে যাওয়া হচ্ছে…</p>

  <p class="fallback">
    স্বয়ংক্রিয়ভাবে না গেলে
    <a href="https://script.google.com/macros/s/AKfycbzkMBKWDavE2ZKIIsufc_N5Kwi6X-eow-Erz9lj9fgOjTuZPeRdkLFRjIOaqYZyT25Q1g/exec?page=dashboard" rel="noreferrer">এখানে ক্লিক করুন</a>
  </p>

  <footer>Powered by <a href="https://www.aumatiq.com" target="_blank" rel="noreferrer">AUMATIQ</a></footer>

<script>
  // Instant redirect — history-তে জমা হবে না (window.location.replace)
  (function () {
    var TARGET = "https://script.google.com/macros/s/AKfycbzkMBKWDavE2ZKIIsufc_N5Kwi6X-eow-Erz9lj9fgOjTuZPeRdkLFRjIOaqYZyT25Q1g/exec?page=dashboard";
    setTimeout(function () {
      window.location.replace(TARGET);
    }, 150);
  })();
</script>

</body>
</html>
