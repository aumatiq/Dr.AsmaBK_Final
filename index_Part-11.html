<style>
  :root{
    --bg:#0F0A1A; --bg2:#160D24; --bg3:#1C1230;
    --rose:#E8608A; --rose2:#F0899F; --teal:#14B8A6; --indigo:#7C3AED;
    --wht:#FDF8FF; --sil:#C4B5D8; --sil2:#7A6892;
    --bd: rgba(232,96,138,0.25);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; overflow:hidden; }
  body{
    background: radial-gradient(ellipse at 50% 30%, var(--bg3) 0%, var(--bg) 65%);
    color: var(--wht);
    font-family:'Inter',sans-serif;
    min-height:100vh; min-height:100svh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px;
    animation: aq-fadein .35s ease-out;
  }
  @keyframes aq-fadein{ from{opacity:0;} to{opacity:1;} }

  .mark{
    width:64px; height:64px; border-radius:18px;
    background: linear-gradient(135deg, var(--rose), var(--indigo));
    display:flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif; font-weight:800; font-size:24px; color:var(--wht);
    margin-bottom:22px;
    box-shadow: 0 12px 36px rgba(232,96,138,0.35);
    animation: aq-pulse 1.4s ease-in-out infinite;
  }
  @keyframes aq-pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.06); }
  }

  h1{
    font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(20px,5vw,26px);
    letter-spacing:-0.3px; margin-bottom:8px;
  }
  h1 .r{ color:var(--rose); }

  p.sub{
    color:var(--sil); font-size:14px; margin-bottom:28px; max-width:320px;
  }

  .spinner{
    width:26px; height:26px; border-radius:50%;
    border:3px solid rgba(232,96,138,0.2);
    border-top-color: var(--rose);
    animation: aq-spin .8s linear infinite;
    margin-bottom:20px;
  }
  @keyframes aq-spin{ to{ transform: rotate(360deg); } }

  .fallback{
    font-size:12px; color:var(--sil2);
  }
  .fallback a{
    color:var(--teal); text-decoration:none; font-weight:600;
  }
  .fallback a:hover{ color:var(--rose); }

  footer{
    position:fixed; bottom:18px; font-size:11px; color:var(--sil2);
    letter-spacing:0.3px;
  }
  footer a{ color:var(--sil2); text-decoration:none; }
</style>

<body>

  <div class="mark" aria-hidden="true">AK</div>
  <h1>ডা. আসমা বিনতে <span class="r">খায়ের</span></h1>
  <div class="spinner" role="status" aria-label="Loading"></div>
  <p class="sub">Patient Portal-এ নিয়ে যাওয়া হচ্ছে…</p>

  </p>

<script>
  // Instant redirect — split-second logo/spinner flash, তারপর চলে যাবে।

  // browser history-তে জমা না হয় (Back বাটনে চাপলে এখানে ফেরত না আসে)।
  (function () {
    var TARGET = "https://script.google.com/macros/s/AKfycbzkMBKWDavE2ZKIIsufc_N5Kwi6X-eow-Erz9lj9fgOjTuZPeRdkLFRjIOaqYZyT25Q1g/exec";
    setTimeout(function () {
      window.location.replace(TARGET);
    }, 150);
  })();
</script>
